name: Vercel Production

# Deploys the frontend project to Vercel and reports the production environment in GitHub.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-production.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: team_jt4SvzDOBYbysg8SceruRvX0
      VERCEL_PROJECT_ID: prj_NB98fgnpULeUbILRFMX9zkwxGLK6
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      NEXT_PUBLIC_API_URL: https://customer-report-agent-api.vercel.app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Check Vercel token
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "Missing GitHub Actions secret: VERCEL_TOKEN"
            echo "Create a Vercel token, then add it in GitHub repo Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Link Vercel project
        working-directory: frontend
        run: |
          mkdir -p .vercel
          printf '{"orgId":"%s","projectId":"%s","projectName":"frontend"}\n' "$VERCEL_ORG_ID" "$VERCEL_PROJECT_ID" > .vercel/project.json

      - name: Deploy frontend to Vercel
        id: deploy
        working-directory: frontend
        run: |
          deployment_url="$(npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN" --build-env NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL")"
          echo "url=${deployment_url}" >> "$GITHUB_OUTPUT"
