name: Vercel Production

# Deploys the frontend to Vercel and reports the live URL as the GitHub production deployment.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-production.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  production:
    name: Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://frontend-nine-taupe-kl5d1l29m1.vercel.app
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
      NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Deploy frontend to Vercel
        id: vercel
        working-directory: frontend
        run: |
          npx vercel@latest pull --yes --environment=production --token="$VERCEL_TOKEN"
          deployment_url="$(npx vercel@latest deploy --prod --yes --token="$VERCEL_TOKEN" --build-env NEXT_PUBLIC_API_URL="$NEXT_PUBLIC_API_URL" | tail -n 1)"
          echo "deployment_url=$deployment_url" >> "$GITHUB_OUTPUT"
          echo "Deployment URL: $deployment_url"

      - name: Create GitHub production deployment
        uses: actions/github-script@v7
        with:
          script: |
            const environmentUrl = "${{ steps.vercel.outputs.deployment_url }}";
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "production",
              auto_merge: false,
              required_contexts: [],
              description: "Production frontend on Vercel"
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: "success",
              environment_url: environmentUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Production is live on Vercel"
            });
