name: Vercel Production

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-production.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    name: Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: team_jt4SvzDOBYbysg8SceruRvX0
      VERCEL_PROJECT_ID: prj_NB98fgnpULeUbILRFMX9zkwxGLK6
      NEXT_PUBLIC_API_URL: https://customer-report-agent-api.vercel.app

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Pull Vercel project settings
        working-directory: frontend
        run: npx vercel@latest pull --yes --environment=production --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Build frontend
        working-directory: frontend
        run: npx vercel@latest build --prod --token="${{ secrets.VERCEL_TOKEN }}"

      - name: Deploy frontend to Vercel
        id: deploy
        working-directory: frontend
        run: |
          deployment_url="$(npx vercel@latest deploy --prebuilt --prod --token="${{ secrets.VERCEL_TOKEN }}")"
          echo "url=${deployment_url}" >> "$GITHUB_OUTPUT"
