name: Vercel Production

# Reports the live Vercel frontend as the GitHub production deployment.

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
      - ".github/workflows/vercel-production.yml"
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

jobs:
  production:
    name: Production
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://frontend-nine-taupe-kl5d1l29m1.vercel.app

    steps:
      - name: Create GitHub production deployment
        uses: actions/github-script@v7
        with:
          script: |
            const environmentUrl = "https://frontend-nine-taupe-kl5d1l29m1.vercel.app";
            const deployment = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: "production",
              auto_merge: false,
              required_contexts: [],
              description: "Production frontend on Vercel"
            });

            await github.rest.repos.createDeploymentStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              deployment_id: deployment.data.id,
              state: "success",
              environment_url: environmentUrl,
              log_url: `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              description: "Production is live on Vercel"
            });
