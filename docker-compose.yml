services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      BACKEND_HOST: 0.0.0.0
      BACKEND_PORT: 8010
      CORS_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "8010:8010"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8010}
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8010}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
